upstream recipe_backend {
    least_conn;
    # backend host and port are substituted at container start via envsubst
    server ${BACKEND_HOST}:${BACKEND_PORT};
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://recipe_backend;
        proxy_http_version 1.1;
        # Preserve upstream host for Grafana to avoid host-based redirects/errors
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /metrics {
        proxy_pass http://recipe_backend/metrics;
        proxy_http_version 1.1;
        # Preserve upstream host for Prometheus to avoid host-based redirects/errors
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/schema {
        proxy_pass http://recipe_backend/api/schema;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana UI reverse proxy
    location = /grafana {
        return 301 /grafana/;
    }

    location /grafana/ {
        proxy_pass http://${BACKEND_HOST}:${GRAFANA_PORT};
        proxy_http_version 1.1;
        # Rewrite upstream redirects (Location) so clients see the /grafana/ prefix
        proxy_redirect / /grafana/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /grafana/api/live/ {
        proxy_pass http://${BACKEND_HOST}:${GRAFANA_PORT};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prometheus UI reverse proxy
    location /prometheus/ {
        proxy_pass http://${BACKEND_HOST}:${PROMETHEUS_PORT}/;
        proxy_http_version 1.1;
        # Rewrite upstream redirects so clients use /prometheus/ prefix
        proxy_redirect / /prometheus/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
