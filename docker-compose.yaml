services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sinatra-app
    expose:
      - "1010"
    environment:
      - RACK_ENV=production
      - DATABASE=app.db
    volumes:
      - ./db:/app/db
      - ./static:/app/static
      - ./views:/app/views
    networks:
      - shared-monitoring
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: sinatra-nginx
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - shared-monitoring
    restart: unless-stopped

networks:
  shared-monitoring:
    name: agile-linus-shared-monitoring
