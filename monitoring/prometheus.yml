global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "node"
    static_configs:
      - targets:
          - "${NGINX_PRIVATE_IP}:9100"
          - "${BACKEND_PRIVATE_IP}:9100"
          - "${DB_PRIVATE_IP}:9100"

  - job_name: "nginx"
    static_configs:
      - targets: ["${NGINX_PRIVATE_IP}:9113"]

  - job_name: "backend"
    static_configs:
      - targets: ["${BACKEND_PRIVATE_IP}:8080"]
    metrics_path: "/metrics"

  - job_name: "postgres"
    static_configs:
      - targets: ["${DB_PRIVATE_IP}:9187"]