services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    # Prometheus runs on the backend VM and is only reachable via private DNS
    # Do not publish port 9090 to the public host when running on the backend.
    networks:
      - shared-monitoring

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    # Grafana will be proxied via nginx on the public VM; avoid binding to host port here.
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - shared-monitoring

networks:
  shared-monitoring:
    name: agile-linus-shared-monitoring