name: Quality Pipeline

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: recipe_cookbook
      DB_USER: recipe_user
      DB_PASSWORD: recipe_pass
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: recipe_cookbook
          POSTGRES_USER: recipe_user
          POSTGRES_PASSWORD: recipe_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recipe_user -d recipe_cookbook"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1
          bundler-cache: false

      - name: Install dependencies
        run: bundle install

      - name: Wait for Postgres
        env:
          PGPASSWORD: ${{ env.DB_PASSWORD }}
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -p 5432 -U ${{ env.DB_USER }} -d ${{ env.DB_NAME }}; do sleep 1; done

      - name: List Postgres databases
        env:
          PGPASSWORD: ${{ env.DB_PASSWORD }}
        run: psql -h localhost -U ${{ env.DB_USER }} -d postgres -c '\l'

      - name: Migrate SQLite -> Postgres
        env:
          DB_HOST: ${{ env.DB_HOST }}
          DB_PORT: ${{ env.DB_PORT }}
          DB_NAME: ${{ env.DB_NAME }}
          DB_USER: ${{ env.DB_USER }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
        run: ruby backend/database/migrate_sqlite_to_postgres.rb

      - name: Lint with RuboCop
        run: bundle exec rubocop
        working-directory: backend

      - name: Run RSpec test suite
        run: bundle exec rspec --format progress
        working-directory: backend

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.qualitygate.wait=true
