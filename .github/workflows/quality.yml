name: Quality Pipeline

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: recipe_cookbook
      DB_USER: recipe_user
      DB_PASSWORD: recipe_pass
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: recipe_cookbook
          POSTGRES_USER: recipe_user
          POSTGRES_PASSWORD: recipe_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recipe_user -d recipe_cookbook"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1
          bundler-cache: false

      - name: Install dependencies
        run: bundle install

      - name: Wait for Postgres
        env:
          PGPASSWORD: ${{ env.DB_PASSWORD }}
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -p 5432 -U ${{ env.DB_USER }} -d ${{ env.DB_NAME }}; do sleep 1; done

      - name: List Postgres databases
        env:
          PGPASSWORD: ${{ env.DB_PASSWORD }}
        run: psql -h localhost -U ${{ env.DB_USER }} -d postgres -c '\l'

      - name: Initialize Postgres schema and seed data
        env:
          PGPASSWORD: ${{ env.DB_PASSWORD }}
        run: |
          psql -h ${{ env.DB_HOST }} -p ${{ env.DB_PORT }} -U ${{ env.DB_USER }} -d ${{ env.DB_NAME }} -v ON_ERROR_STOP=1 -f backend/database/schema.pg.sql
          psql -h ${{ env.DB_HOST }} -p ${{ env.DB_PORT }} -U ${{ env.DB_USER }} -d ${{ env.DB_NAME }} -v ON_ERROR_STOP=1 -f backend/database/seeds.sql

      - name: Lint with RuboCop
        run: bundle exec rubocop
        working-directory: backend

      - name: Run RSpec test suite
        run: bundle exec rspec --format progress
        working-directory: backend

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' && env.SONAR_PROJECT_KEY != ''
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.qualitygate.wait=true
