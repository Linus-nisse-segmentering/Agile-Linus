name: Deploy to Azure VM (unstuck)

on:
  push:
    branches:
      - main
      - test-deploy
      - devtest-workflow
      - unstuck-test-deploy
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  # Make concurrency group specific to the branch/ref so runs on other
  # branches don't block each other. Uses `github.ref_name` to avoid
  # including the full `refs/heads/` prefix in the group name.
  group: deploy-azure-vm-${{ github.ref_name }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/linus-nisse-segmentering/agile-linus

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Save image tar for relay
        run: |
          # ensure runner can pull the image (we logged into GHCR earlier)
          docker pull ${{ env.IMAGE_NAME }}:latest || true
          docker save ${{ env.IMAGE_NAME }}:latest | gzip > image_latest.tar.gz

      - name: Copy deploy artifacts to public VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.backend.yaml,monitoring,infrastructure/nginx/default.conf,image_latest.tar.gz
          target: /home/${{ secrets.SSH_USER }}/app

      - name: Deploy on public VM and relay to backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            mkdir -p ~/app
            mkdir -p ~/app/infrastructure/nginx
            # Move uploaded files into place if present
            mv ~/app/docker-compose.backend.yaml ~/app/docker-compose.backend.yaml 2>/dev/null || true
            mv ~/app/monitoring/docker-compose.yml ~/app/monitoring/docker-compose.yml 2>/dev/null || true
            mv ~/app/infrastructure/nginx/default.conf ~/app/infrastructure/nginx/default.conf 2>/dev/null || true

            # Create env file that will also be forwarded to backend and used by nginx template
            printf '%s\n' "DB_HOST=${{ secrets.DB_HOST }}" "DB_PORT=${{ secrets.DB_PORT }}" "DB_NAME=${{ secrets.DB_NAME }}" "DB_USER=${{ secrets.DB_USER }}" "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" "DB_SSLMODE=${{ secrets.DB_SSLMODE }}" "BACKEND_HOST=${{ secrets.BACKEND_HOST }}" "BACKEND_PORT=${{ secrets.BACKEND_PORT }}" "GRAFANA_PORT=3000" "PROMETHEUS_PORT=9090" > ~/app/.env
            # Ensure BACKEND_PORT has a sensible default in the file if the secret was empty
            sed -i -e 's/^BACKEND_PORT=$/BACKEND_PORT=1010/' ~/app/.env || true

            # Export .env and substitute variables into nginx template so nginx sees real backend host/ports
            set -a
            # shellcheck disable=SC1090
            . ~/app/.env || true
            # Ensure BACKEND_PORT has a sensible default if secret not set
            export BACKEND_PORT=${BACKEND_PORT:-1010}
            set +a
            if ! command -v envsubst >/dev/null 2>&1; then
              sudo apt-get update -y || true
              sudo apt-get install -y gettext-base || true
            fi
            if [ -f ~/app/infrastructure/nginx/default.conf ]; then
              envsubst '${BACKEND_HOST} ${BACKEND_PORT} ${GRAFANA_PORT} ${PROMETHEUS_PORT}' < ~/app/infrastructure/nginx/default.conf > ~/app/infrastructure/nginx/default.conf.processed || true
              mv ~/app/infrastructure/nginx/default.conf.processed ~/app/infrastructure/nginx/default.conf || true
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found. Installing..."
              sudo apt-get update -y
              sudo apt-get install -y apt-transport-https ca-certificates curl software-properties-common
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
              echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo usermod -aG docker $USER || true
            fi

            # Write deploy key on public VM so it can SSH/SCP to the backend VM
            mkdir -p ~/.ssh
            # Prefer a base64-encoded secret to preserve newlines reliably.
            if [ -n "${{ secrets.BACKEND_SSH_PRIVATE_KEY_B64 }}" ]; then
              echo "${{ secrets.BACKEND_SSH_PRIVATE_KEY_B64 }}" | base64 --decode > ~/.ssh/deploy_key
            else
              # Fallback: write raw private key secret (must include newlines exactly)
              printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
            fi
            chmod 600 ~/.ssh/deploy_key
            SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/deploy_key"

            BACKEND_USER=${{ secrets.SSH_USER }}
            BACKEND_HOST=${{ secrets.BACKEND_HOST }}

            # Ensure relay targets exist before copying; scp fails if the remote directory is missing.
            ssh $SSH_OPTS ${BACKEND_USER}@${BACKEND_HOST} "mkdir -p ~/app ~/monitoring"

            # Relay backend files to backend VM
            scp $SSH_OPTS ~/app/docker-compose.backend.yaml ${BACKEND_USER}@${BACKEND_HOST}:~/app/docker-compose.yaml
            # Copy monitoring contents (not the parent folder) to avoid ~/monitoring/monitoring nesting
            scp -r $SSH_OPTS ~/app/monitoring/* ${BACKEND_USER}@${BACKEND_HOST}:~/monitoring/
            scp $SSH_OPTS ~/app/image_latest.tar.gz ${BACKEND_USER}@${BACKEND_HOST}:~/app/image_latest.tar.gz

            # Run backend stack on backend VM
            ssh $SSH_OPTS ${BACKEND_USER}@${BACKEND_HOST} <<'REMOTE'
            set -e
            mkdir -p ~/app
            mkdir -p ~/monitoring
            # write .env on backend
            printf '%s\n' "DB_HOST=${{ secrets.DB_HOST }}" "DB_PORT=${{ secrets.DB_PORT }}" "DB_NAME=${{ secrets.DB_NAME }}" "DB_USER=${{ secrets.DB_USER }}" "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" "DB_SSLMODE=${{ secrets.DB_SSLMODE }}" > ~/app/.env
            printf '%s\n' "GRAFANA_ROOT_URL=http://${{ secrets.SSH_HOST }}/grafana/" > ~/monitoring/.env
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y apt-transport-https ca-certificates curl software-properties-common
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
              echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo usermod -aG docker $USER || true
            fi
            sudo docker network create agile-linus-shared-monitoring >/dev/null 2>&1 || true
            cd ~/app
            # If an image tar was provided, load it to avoid GHCR auth issues
            if [ -f ~/app/image_latest.tar.gz ]; then
              sudo docker load < ~/app/image_latest.tar.gz || true
            else
              sudo docker compose pull || true
            fi
            sudo docker compose up -d --wait --wait-timeout 180 || true
            # start monitoring if present
            if [ -f ~/monitoring/docker-compose.yml ]; then
              cd ~/monitoring
              sudo docker compose pull || true
              sudo docker compose up -d --force-recreate --wait --wait-timeout 180 || true
            elif [ -f ~/monitoring/monitoring/docker-compose.yml ]; then
              # Backward-compat cleanup if older runs created nested monitoring/monitoring
              cd ~/monitoring/monitoring
              sudo docker compose pull || true
              sudo docker compose up -d --force-recreate --wait --wait-timeout 180 || true
            fi
            sudo docker image prune -f || true
            REMOTE

            # Apply nginx config and run nginx-only compose on public VM
            printf '%s\n' "services:" "  nginx:" "    image: nginx:1.27-alpine" "    ports:" "      - \"80:80\"" "    volumes:" "      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf" > ~/app/docker-compose.nginx.yaml
            cd ~/app
            sudo docker compose -f docker-compose.nginx.yaml pull || true
            sudo docker compose -f docker-compose.nginx.yaml up -d --wait --wait-timeout 60 || true
            sudo docker compose -f docker-compose.nginx.yaml ps || true
            sudo docker image prune -f || true
