name: Deploy to Azure VM

on:
  push:
    branches:
      - main
      - test-deploy
      - devtest-workflow
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-azure-vm
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/linus-nisse-segmentering/agile-linus

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to backend VM via SSH
        shell: bash
        env:
          BACKEND_HOST: ${{ secrets.BACKEND_HOST }}
          BACKEND_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          # Prepare private key (prefer base64 secret to preserve formatting)
          if [ -n "${{ secrets.BACKEND_SSH_PRIVATE_KEY_B64 }}" ]; then
            echo "${{ secrets.BACKEND_SSH_PRIVATE_KEY_B64 }}" | base64 --decode > /tmp/deploy_key
          else
            cat > /tmp/deploy_key <<'KEY'
${{ secrets.SSH_PRIVATE_KEY }}
KEY
          fi
          chmod 600 /tmp/deploy_key

          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i /tmp/deploy_key"

          # Create remote directories
          ssh $SSH_OPTS ${BACKEND_USER}@${BACKEND_HOST} "mkdir -p ~/app ~/app/infrastructure/nginx ~/monitoring"

          # Copy artifacts
          scp $SSH_OPTS docker-compose.backend.yaml ${BACKEND_USER}@${BACKEND_HOST}:~/app/docker-compose.yaml
          scp $SSH_OPTS infrastructure/nginx/default.conf ${BACKEND_USER}@${BACKEND_HOST}:~/app/infrastructure/nginx/default.conf
          scp -r $SSH_OPTS monitoring ${BACKEND_USER}@${BACKEND_HOST}:~/monitoring || true

          # Run deployment on backend VM
          ssh $SSH_OPTS ${BACKEND_USER}@${BACKEND_HOST} <<'REMOTE'
          set -e
          mkdir -p ~/app ~/monitoring
          # write .env on backend
          cat > ~/app/.env <<'ENV'
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_SSLMODE=${{ secrets.DB_SSLMODE }}
          ENV
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y apt-transport-https ca-certificates curl software-properties-common
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
            echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
            sudo apt-get update -y
            sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
            sudo usermod -aG docker $USER || true
          fi
          cd ~/app
          sudo docker compose pull || true
          sudo docker compose up -d --wait --wait-timeout 180 || true
          # start monitoring if present
          if [ -f ~/monitoring/docker-compose.yml ]; then
            cd ~/monitoring
            sudo docker compose pull || true
            sudo docker compose up -d --wait --wait-timeout 180 || true
          fi
          # Run nginx using local compose
          cat > ~/app/docker-compose.nginx.yaml <<'YAML'
          services:
            nginx:
              image: nginx:1.27-alpine
              ports:
                - "80:80"
              volumes:
                - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
          YAML
          sudo docker compose -f docker-compose.nginx.yaml pull || true
          sudo docker compose -f docker-compose.nginx.yaml up -d --wait --wait-timeout 60 || true
          sudo docker image prune -f || true
          REMOTE
