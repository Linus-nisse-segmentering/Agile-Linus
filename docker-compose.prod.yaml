services:
  app:
    image: ghcr.io/linus-nisse-segmentering/agile-linus:latest
    container_name: sinatra-app
    expose:
      - "1010"
    environment:
      - RACK_ENV=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSLMODE=${DB_SSLMODE:-prefer}
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: sinatra-nginx
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
