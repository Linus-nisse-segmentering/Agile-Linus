services:
  db:
    image: postgres:15-alpine
    container_name: sinatra-db
    environment:
      - POSTGRES_DB=recipe_cookbook
      - POSTGRES_USER=recipe_user
      - POSTGRES_PASSWORD=recipe_pass
    volumes:
      - recipe_db_data_v2:/var/lib/postgresql/data
    networks:
      - shared-monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe_user -d recipe_cookbook"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: ghcr.io/linus-nisse-segmentering/agile-linus:latest
    container_name: sinatra-app
    expose:
      - "1010"
    environment:
      - RACK_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=recipe_cookbook
      - DB_USER=recipe_user
      - DB_PASSWORD=recipe_pass
      - DB_SSLMODE=${DB_SSLMODE:-prefer}
      - DB_INIT=true
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - shared-monitoring
    healthcheck:
      test: ["CMD-SHELL", "ruby -e \"require 'net/http'; res = Net::HTTP.get_response(URI('http://127.0.0.1:1010/metrics')); exit(res.is_a?(Net::HTTPSuccess) ? 0 : 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: sinatra-nginx
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - shared-monitoring
    restart: unless-stopped

networks:
  shared-monitoring:
    name: agile-linus-shared-monitoring

volumes:
  recipe_db_data_v2:
